<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RadioStream — Live</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --accent: #e8ff3c;
    --accent2: #ff3caa;
    --text: #f0f0f8;
    --muted: #7a7a99;
    --border: rgba(255,255,255,0.07);
    --glow: 0 0 40px rgba(232,255,60,0.15);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(232,255,60,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,255,60,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridPulse 8s ease-in-out infinite;
    z-index: 0;
  }

  @keyframes gridPulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  /* Floating orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    z-index: 0;
    pointer-events: none;
  }
  .orb1 {
    width: 400px; height: 400px;
    background: rgba(232,255,60,0.06);
    top: -100px; left: -100px;
    animation: orbFloat1 12s ease-in-out infinite;
  }
  .orb2 {
    width: 300px; height: 300px;
    background: rgba(255,60,170,0.06);
    bottom: -80px; right: -80px;
    animation: orbFloat2 15s ease-in-out infinite;
  }
  @keyframes orbFloat1 {
    0%, 100% { transform: translate(0,0); }
    50% { transform: translate(60px, 40px); }
  }
  @keyframes orbFloat2 {
    0%, 100% { transform: translate(0,0); }
    50% { transform: translate(-40px, -60px); }
  }

  /* ─── MAIN CARD ─── */
  .card {
    position: relative;
    z-index: 1;
    width: 420px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    overflow: hidden;
    animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(30px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Top accent bar */
  .card-top-bar {
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  /* Station header */
  .station-header {
    padding: 28px 28px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .station-logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .logo-icon svg { width: 18px; height: 18px; }

  .station-name {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(232,255,60,0.1);
    border: 1px solid rgba(232,255,60,0.2);
    border-radius: 999px;
    padding: 4px 12px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 1px;
  }

  .live-dot {
    width: 7px; height: 7px;
    background: var(--accent);
    border-radius: 50%;
    animation: livePulse 1.2s ease-in-out infinite;
  }

  @keyframes livePulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.3; transform: scale(0.6); }
  }

  /* Visualizer */
  .viz-section {
    padding: 24px 28px 20px;
    position: relative;
  }

  .visualizer {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 64px;
    justify-content: center;
  }

  .bar {
    width: 6px;
    background: var(--accent);
    border-radius: 3px;
    opacity: 0.7;
    transform-origin: bottom;
    animation: barIdle 2s ease-in-out infinite;
  }

  .bar:nth-child(2n) { background: var(--accent2); }

  @keyframes barIdle {
    0%, 100% { transform: scaleY(0.2); }
    50% { transform: scaleY(0.4); }
  }

  .bar.active {
    animation: barActive var(--dur, 0.6s) ease-in-out infinite alternate;
  }

  @keyframes barActive {
    0% { transform: scaleY(var(--min, 0.2)); }
    100% { transform: scaleY(var(--max, 1)); }
  }

  /* Now playing */
  .now-playing {
    padding: 0 28px 20px;
  }

  .np-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .np-title {
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    line-height: 1.2;
  }

  .np-scroll {
    animation: scrollText 12s linear infinite;
    display: inline-block;
  }

  @keyframes scrollText {
    0% { transform: translateX(0); }
    40% { transform: translateX(-60%); }
    60% { transform: translateX(-60%); }
    100% { transform: translateX(0); }
  }

  .np-artist {
    font-size: 13px;
    color: var(--muted);
    margin-top: 3px;
  }

  /* ─── PLAY BUTTON AREA ─── */
  .controls {
    padding: 0 28px 28px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .play-btn {
    width: 64px; height: 64px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s ease, box-shadow 0.2s ease;
    box-shadow: 0 0 0 0 rgba(232,255,60,0.4);
    position: relative;
    overflow: hidden;
  }

  .play-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: white;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .play-btn:hover::before { opacity: 0.1; }
  .play-btn:active { transform: scale(0.93); }

  .play-btn.playing {
    animation: playPulse 2s ease-in-out infinite;
  }

  @keyframes playPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(232,255,60,0.4); }
    50% { box-shadow: 0 0 0 14px rgba(232,255,60,0); }
  }

  .play-btn svg { width: 26px; height: 26px; }

  .volume-area {
    flex: 1;
  }

  .vol-label {
    display: flex;
    justify-content: space-between;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .vol-slider {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    border-radius: 2px;
    background: var(--surface2);
    outline: none;
    cursor: pointer;
  }

  .vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    transition: transform 0.15s;
  }

  .vol-slider:hover::-webkit-slider-thumb { transform: scale(1.3); }

  .status-line {
    padding: 0 28px 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status-text {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .status-text span { color: var(--accent); }

  /* ─── SLIDE PANEL ─── */
  .panel-trigger {
    position: fixed;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    z-index: 100;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-right: none;
    border-radius: 12px 0 0 12px;
    padding: 14px 10px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    transition: background 0.2s, transform 0.2s;
  }

  .panel-trigger:hover {
    background: var(--surface);
    transform: translateY(-50%) translateX(-2px);
  }

  .panel-trigger svg { width: 16px; height: 16px; color: var(--accent); }

  .trigger-text {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    writing-mode: vertical-rl;
    text-orientation: mixed;
    transform: rotate(180deg);
    letter-spacing: 2px;
  }

  .slide-panel {
    position: fixed;
    top: 0; right: 0;
    width: 320px;
    height: 100vh;
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 200;
    transform: translateX(100%);
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .slide-panel.open {
    transform: translateX(0);
  }

  .panel-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 150;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .panel-overlay.show {
    opacity: 1;
    pointer-events: all;
  }

  .panel-header {
    padding: 24px 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .panel-title {
    font-size: 16px;
    font-weight: 800;
  }

  .close-btn {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
    transition: background 0.2s, color 0.2s;
  }

  .close-btn:hover { background: var(--surface2); color: var(--text); }
  .close-btn svg { width: 16px; height: 16px; }

  .panel-body {
    padding: 16px 20px;
    overflow-y: auto;
    flex: 1;
  }

  /* Station URL input */
  .url-section {
    margin-bottom: 24px;
  }

  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .url-input-wrap {
    display: flex;
    gap: 8px;
  }

  .url-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .url-input:focus {
    border-color: rgba(232,255,60,0.4);
  }

  .url-input::placeholder { color: var(--muted); }

  .apply-btn {
    background: var(--accent);
    border: none;
    border-radius: 10px;
    padding: 10px 16px;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: #0a0a0f;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .apply-btn:hover { opacity: 0.85; }

  /* Preset stations */
  .stations-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .station-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }

  .station-item:hover {
    border-color: rgba(232,255,60,0.2);
    background: rgba(232,255,60,0.04);
  }

  .station-item.active {
    border-color: rgba(232,255,60,0.5);
    background: rgba(232,255,60,0.06);
  }

  .si-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }

  .station-item.active .si-dot {
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }

  .si-info { flex: 1; min-width: 0; }

  .si-name {
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .si-genre {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }

  .si-bitrate {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  /* Info section */
  .info-section {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .info-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }

  .info-key {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .info-val {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--accent);
  }
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<!-- ─── PANEL TRIGGER ─── -->
<button class="panel-trigger" id="panelTrigger" title="Daftar Stasiun">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M9 18V5l12-2v13"/>
    <circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
  </svg>
  <span class="trigger-text">STASIUN</span>
</button>

<!-- ─── SLIDE PANEL ─── -->
<div class="panel-overlay" id="panelOverlay"></div>

<div class="slide-panel" id="slidePanel">
  <div class="panel-header">
    <span class="panel-title">Stasiun Radio</span>
    <button class="close-btn" id="closePanel">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
  <div class="panel-body">
    <div class="url-section">
      <p class="section-label">URL Shoutcast</p>
      <div class="url-input-wrap">
        <input type="text" class="url-input" id="customUrl" placeholder="http://stream.example.com:8000/stream" />
        <button class="apply-btn" id="applyUrl">Terapkan</button>
      </div>
    </div>

    <p class="section-label">Preset Stasiun</p>
    <div class="stations-list" id="stationsList">
      <!-- populated by JS -->
    </div>

    <div class="info-section">
      <p class="section-label" style="margin-bottom: 0;">Info Stream</p>
      <div class="info-row">
        <span class="info-key">FORMAT</span>
        <span class="info-val" id="infoFormat">MP3</span>
      </div>
      <div class="info-row">
        <span class="info-key">BITRATE</span>
        <span class="info-val" id="infoBitrate">128 kbps</span>
      </div>
      <div class="info-row">
        <span class="info-key">STATUS</span>
        <span class="info-val" id="infoStatus">SIAP</span>
      </div>
    </div>
  </div>
</div>

<!-- ─── MAIN CARD ─── -->
<div class="card">
  <div class="card-top-bar"></div>

  <div class="station-header">
    <div class="station-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0a0a0f" stroke-width="2.5">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </div>
      <span class="station-name" id="stationDisplayName">RadioStream</span>
    </div>
    <div class="live-badge">
      <div class="live-dot"></div>
      LIVE
    </div>
  </div>

  <!-- Visualizer -->
  <div class="viz-section">
    <div class="visualizer" id="visualizer"></div>
  </div>

  <!-- Now playing -->
  <div class="now-playing">
    <p class="np-label">Sedang Diputar</p>
    <div class="np-title" id="npTitleWrap">
      <span class="np-scroll" id="npTitle">Pilih stasiun untuk memulai</span>
    </div>
    <p class="np-artist" id="npArtist">— RadioStream Player —</p>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="play-btn" id="playBtn">
      <svg id="playIcon" viewBox="0 0 24 24" fill="#0a0a0f">
        <polygon points="5,3 19,12 5,21"/>
      </svg>
    </button>
    <div class="volume-area">
      <div class="vol-label">
        <span>Volume</span>
        <span id="volDisplay">80%</span>
      </div>
      <input type="range" class="vol-slider" id="volSlider" min="0" max="100" value="80" />
    </div>
  </div>

  <!-- Status -->
  <div class="status-line">
    <span class="status-text" id="statusText">Klik <span>▶</span> untuk memutar</span>
  </div>
</div>

<audio id="audioPlayer" crossorigin="anonymous"></audio>

<script>
const stations = [
  { name: 'Ramu FM', genre: 'Pop / Hits', bitrate: '128 kbps', url: 'https://i.klikhost.com/8100/stream' },
];

let isPlaying = false;
let currentStation = null;
let currentIndex = -1;

const audio = document.getElementById('audioPlayer');
const playBtn = document.getElementById('playBtn');
const playIcon = document.getElementById('playIcon');
const statusText = document.getElementById('statusText');
const npTitle = document.getElementById('npTitle');
const npArtist = document.getElementById('npArtist');
const volSlider = document.getElementById('volSlider');
const volDisplay = document.getElementById('volDisplay');
const stationDisplayName = document.getElementById('stationDisplayName');
const infoStatus = document.getElementById('infoStatus');
const infoBitrate = document.getElementById('infoBitrate');

// Build visualizer bars
const viz = document.getElementById('visualizer');
const barCount = 28;
const bars = [];
for (let i = 0; i < barCount; i++) {
  const b = document.createElement('div');
  b.className = 'bar';
  b.style.height = '100%';
  const minV = (Math.random() * 0.15 + 0.08).toFixed(2);
  const maxV = (Math.random() * 0.7 + 0.3).toFixed(2);
  const dur = (Math.random() * 0.5 + 0.35).toFixed(2);
  b.style.setProperty('--min', minV);
  b.style.setProperty('--max', maxV);
  b.style.setProperty('--dur', dur + 's');
  viz.appendChild(b);
  bars.push(b);
}

function setVisualizerActive(active) {
  bars.forEach(b => {
    if (active) {
      b.classList.add('active');
      const minV = (Math.random() * 0.15 + 0.08).toFixed(2);
      const maxV = (Math.random() * 0.75 + 0.25).toFixed(2);
      const dur = (Math.random() * 0.5 + 0.3).toFixed(2);
      b.style.setProperty('--min', minV);
      b.style.setProperty('--max', maxV);
      b.style.setProperty('--dur', dur + 's');
    } else {
      b.classList.remove('active');
    }
  });
}

// Populate stations list
const stationsList = document.getElementById('stationsList');
stations.forEach((st, i) => {
  const item = document.createElement('div');
  item.className = 'station-item';
  item.innerHTML = `
    <div class="si-dot"></div>
    <div class="si-info">
      <div class="si-name">${st.name}</div>
      <div class="si-genre">${st.genre}</div>
    </div>
    <span class="si-bitrate">${st.bitrate}</span>
  `;
  item.addEventListener('click', () => loadStation(i, st));
  stationsList.appendChild(item);
});

function updateStationUI(index) {
  document.querySelectorAll('.station-item').forEach((el, i) => {
    el.classList.toggle('active', i === index);
  });
}

function loadStation(index, station) {
  currentStation = station;
  currentIndex = index;
  updateStationUI(index);
  stationDisplayName.textContent = station.name;
  infoBitrate.textContent = station.bitrate;
  npTitle.textContent = station.name;
  npArtist.textContent = station.genre;
  setStatus('Memuat...', true);
  audio.src = station.url;
  startPlay();
}

function startPlay() {
  const p = audio.play();
  if (p !== undefined) {
    p.then(() => {
      setPlaying(true);
    }).catch(err => {
      setStatus('Gagal memuat — coba URL lain', false);
      setPlaying(false);
    });
  }
}

function setPlaying(state) {
  isPlaying = state;
  if (state) {
    playIcon.innerHTML = '<rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>';
    playBtn.classList.add('playing');
    setStatus('Sedang diputar', true);
    setVisualizerActive(true);
    infoStatus.textContent = 'ONLINE';
  } else {
    playIcon.innerHTML = '<polygon points="5,3 19,12 5,21"/>';
    playBtn.classList.remove('playing');
    setVisualizerActive(false);
    infoStatus.textContent = 'PAUSE';
  }
}

function setStatus(msg, live) {
  statusText.innerHTML = live
    ? `<span>●</span> ${msg}`
    : msg;
}

playBtn.addEventListener('click', () => {
  if (!currentStation) {
    if (stations.length > 0) {
      loadStation(0, stations[0]);
    }
    return;
  }
  if (isPlaying) {
    audio.pause();
    setPlaying(false);
  } else {
    startPlay();
  }
});

audio.addEventListener('error', () => {
  setStatus('Koneksi gagal — periksa URL stream', false);
  setPlaying(false);
  setVisualizerActive(false);
  infoStatus.textContent = 'ERROR';
});

audio.addEventListener('waiting', () => setStatus('Buffering...', true));
audio.addEventListener('canplay', () => { if (isPlaying) setStatus('Sedang diputar', true); });

// Volume
audio.volume = 0.8;
volSlider.addEventListener('input', () => {
  const v = parseInt(volSlider.value);
  audio.volume = v / 100;
  volDisplay.textContent = v + '%';
});

// Custom URL
document.getElementById('applyUrl').addEventListener('click', () => {
  const url = document.getElementById('customUrl').value.trim();
  if (!url) return;
  const custom = { name: 'Custom Stream', genre: 'Shoutcast', bitrate: '— kbps', url };
  currentStation = custom;
  currentIndex = -1;
  updateStationUI(-1);
  stationDisplayName.textContent = 'Custom Stream';
  npTitle.textContent = 'Custom Shoutcast';
  npArtist.textContent = url;
  infoStatus.textContent = 'MEMUAT';
  audio.src = url;
  startPlay();
  closePanel();
});

// Panel logic
const panelTrigger = document.getElementById('panelTrigger');
const slidePanel = document.getElementById('slidePanel');
const panelOverlay = document.getElementById('panelOverlay');
const closePanelBtn = document.getElementById('closePanel');

function openPanel() {
  slidePanel.classList.add('open');
  panelOverlay.classList.add('show');
}

function closePanel() {
  slidePanel.classList.remove('open');
  panelOverlay.classList.remove('show');
}

panelTrigger.addEventListener('click', openPanel);
closePanelBtn.addEventListener('click', closePanel);
panelOverlay.addEventListener('click', closePanel);

// Select first station visually but don't autoplay
updateStationUI(-1);
</script>
</body>
</html>
